<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriba - Intelligent Library Management & Database System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#edd8ff',
                            200: '#ddd6fe',
                            300: '#c084fc',
                            400: '#a855f7',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser for AI Output -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar for database lists */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-200">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm"></div>

    <!-- App Wrapper -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between hidden md:flex transition-colors duration-200">
            <div class="p-6">
                <!-- Branding -->
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 rounded-xl bg-primary-600 flex items-center justify-center text-white shadow-lg shadow-primary-500/20">
                        <i data-lucide="library" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight tracking-tight dark:text-white">Scriba</h1>
                        <span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Database System</span>
                    </div>
                </div>

                <!-- Nav Menu -->
                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all bg-primary-50 dark:bg-primary-950/30 text-primary-600 dark:text-primary-400">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        <span>Dashboard</span>
                    </button>
                    <button onclick="switchTab('books')" id="nav-books" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                        <span>Books Catalog</span>
                    </button>
                    <button onclick="switchTab('patrons')" id="nav-patrons" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">
                        <i data-lucide="users" class="w-4 h-4"></i>
                        <span>Patron Directory</span>
                    </button>
                    <button onclick="switchTab('transactions')" id="nav-transactions" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">
                        <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                        <span>Circulation Desk</span>
                    </button>
                    <div class="pt-4 mt-4 border-t border-slate-100 dark:border-slate-800">
                        <span class="px-4 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Co-Pilots</span>
                        <button onclick="switchTab('ai')" id="nav-ai" class="w-full mt-2 flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">
                            <span class="flex h-2 w-2 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                            </span>
                            <i data-lucide="sparkles" class="w-4 h-4 text-indigo-500"></i>
                            <span class="text-indigo-600 dark:text-indigo-400">Librarian AI</span>
                        </button>
                    </div>
                </nav>
            </div>

            <!-- Footer Utilities -->
            <div class="p-6 border-t border-slate-100 dark:border-slate-800 space-y-4">
                <button onclick="toggleDarkMode()" class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <span class="flex items-center gap-2 text-slate-600 dark:text-slate-300">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                        <span id="theme-label">Dark Theme</span>
                    </span>
                    <div class="w-8 h-4 bg-slate-300 dark:bg-primary-600 rounded-full relative transition-colors">
                        <div class="w-3.5 h-3.5 bg-white rounded-full absolute top-[1px] left-[1px] dark:left-[13px] transition-all"></div>
                    </div>
                </button>
                <div class="text-xs text-slate-400 text-center">Version 2.5 (June 2026)</div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 dark:bg-slate-900">
            
            <!-- Top Navbar Header -->
            <header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 flex items-center justify-between px-6 shrink-0 transition-colors duration-200">
                <div class="flex items-center gap-4">
                    <!-- Mobile Hamburger -->
                    <button class="md:hidden p-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900" onclick="toggleMobileMenu()">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 id="page-title" class="font-bold text-xl tracking-tight text-slate-800 dark:text-white">Dashboard Overview</h2>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- DB Reset Button -->
                    <button onclick="confirmResetDB()" class="px-3 py-1.5 text-xs text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/20 border border-rose-200 dark:border-rose-900/50 rounded-lg font-semibold flex items-center gap-1.5 transition-all">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                        <span>Reset Seed Data</span>
                    </button>
                </div>
            </header>

            <!-- Main Dynamic Container -->
            <div id="content-pane" class="flex-1 overflow-y-auto p-6 space-y-6">
                <!-- Inner pages dynamically rendered here -->
            </div>
        </main>
    </div>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-drawer" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden" onclick="toggleMobileMenu()">
        <div class="w-72 bg-white dark:bg-slate-950 h-full p-6 flex flex-col justify-between" onclick="event.stopPropagation()">
            <div>
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-primary-600 flex items-center justify-center text-white shadow-lg">
                            <i data-lucide="library" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h1 class="font-bold text-lg leading-tight tracking-tight dark:text-white">Scriba</h1>
                            <span class="text-xs text-slate-500 font-medium">Database System</span>
                        </div>
                    </div>
                    <button onclick="toggleMobileMenu()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg text-slate-500">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="mobile-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all" id="mobile-nav-dashboard">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        <span>Dashboard</span>
                    </button>
                    <button onclick="switchTab('books'); toggleMobileMenu()" class="mobile-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all" id="mobile-nav-books">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                        <span>Books Catalog</span>
                    </button>
                    <button onclick="switchTab('patrons'); toggleMobileMenu()" class="mobile-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all" id="mobile-nav-patrons">
                        <i data-lucide="users" class="w-4 h-4"></i>
                        <span>Patron Directory</span>
                    </button>
                    <button onclick="switchTab('transactions'); toggleMobileMenu()" class="mobile-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all" id="mobile-nav-transactions">
                        <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                        <span>Circulation Desk</span>
                    </button>
                    <button onclick="switchTab('ai'); toggleMobileMenu()" class="mobile-nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all" id="mobile-nav-ai">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span>Librarian AI</span>
                    </button>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-100 dark:border-slate-800 space-y-4">
                <button onclick="toggleDarkMode(); toggleMobileMenu()" class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <span class="flex items-center gap-2 text-slate-600 dark:text-slate-300">
                        <i data-lucide="moon" class="w-4 h-4"></i>
                        <span>Change Theme</span>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Base Frame (Reusable) -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden transition-all">
        <div id="modal-content" class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-lg border border-slate-200 dark:border-slate-800 p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <!-- Dynamically injected modal details -->
        </div>
    </div>

    <!-- Dynamic JavaScript Engine -->
    <script>
        // Default Seed Library Database Data
        const defaultBooks = [
            { isbn: "978-0141187761", title: "1984", author: "George Orwell", genre: "Dystopian", year: "1949", totalCopies: 5, checkedOut: 2 },
            { isbn: "978-0743273565", title: "The Great Gatsby", author: "F. Scott Fitzgerald", genre: "Classics", year: "1925", totalCopies: 4, checkedOut: 1 },
            { isbn: "978-0446310789", title: "To Kill a Mockingbird", author: "Harper Lee", genre: "Classics", year: "1960", totalCopies: 3, checkedOut: 0 },
            { isbn: "978-0547928227", title: "The Hobbit", author: "J.R.R. Tolkien", genre: "Fantasy", year: "1937", totalCopies: 6, checkedOut: 3 },
            { isbn: "978-0062315007", title: "The Alchemist", author: "Paulo Coelho", genre: "Philosophy", year: "1988", totalCopies: 8, checkedOut: 0 },
            { isbn: "978-0140449136", title: "The Odyssey", author: "Homer", genre: "Epic Poetry", year: "-800", totalCopies: 2, checkedOut: 1 }
        ];

        const defaultPatrons = [
            { id: "PAT-001", name: "Sarah Jenkins", email: "sarah.j@library.com", phone: "555-0199", status: "Active" },
            { id: "PAT-002", name: "David Miller", email: "d.miller@library.com", phone: "555-0142", status: "Active" },
            { id: "PAT-003", name: "Aria Montgomery", email: "aria.m@library.com", phone: "555-0177", status: "Active" },
            { id: "PAT-004", name: "Michael Vance", email: "vance.m@library.com", phone: "555-0123", status: "Suspended" }
        ];

        const defaultTransactions = [
            { id: "TXN-8001", isbn: "978-0141187761", patronId: "PAT-001", issueDate: "2026-06-10", dueDate: "2026-06-24", returnDate: null },
            { id: "TXN-8002", isbn: "978-0547928227", patronId: "PAT-002", issueDate: "2026-06-15", dueDate: "2026-06-29", returnDate: null },
            { id: "TXN-8003", isbn: "978-0140449136", patronId: "PAT-003", issueDate: "2026-06-20", dueDate: "2026-07-04", returnDate: null },
            { id: "TXN-8004", isbn: "978-0743273565", patronId: "PAT-001", issueDate: "2026-06-01", dueDate: "2026-06-15", returnDate: "2026-06-14" },
            { id: "TXN-8005", isbn: "978-0547928227", patronId: "PAT-002", issueDate: "2026-06-05", dueDate: "2026-06-19", returnDate: "2026-06-18" },
            { id: "TXN-8006", isbn: "978-0141187761", patronId: "PAT-003", issueDate: "2026-05-25", dueDate: "2026-06-08", returnDate: "2026-06-07" }
        ];

        // State Store
        let state = {
            books: [],
            patrons: [],
            transactions: [],
            currentTab: 'dashboard',
            isDarkMode: false,
            searchTexts: { books: '', patrons: '', transactions: '' },
            filters: { bookGenre: 'All', patronStatus: 'All', txnStatus: 'All' }
        };

        // Initialize App & Load Database
        window.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            applyTheme();
            switchTab(state.currentTab);
        });

        function initDatabase(reset = false) {
            if (reset || !localStorage.getItem('scriba_db_books')) {
                localStorage.setItem('scriba_db_books', JSON.stringify(defaultBooks));
                localStorage.setItem('scriba_db_patrons', JSON.stringify(defaultPatrons));
                localStorage.setItem('scriba_db_txns', JSON.stringify(defaultTransactions));
                if (reset) showToast('Database restored to default seed values!', 'success');
            }
            state.books = JSON.parse(localStorage.getItem('scriba_db_books'));
            state.patrons = JSON.parse(localStorage.getItem('scriba_db_patrons'));
            state.transactions = JSON.parse(localStorage.getItem('scriba_db_txns'));
        }

        function saveDatabase() {
            localStorage.setItem('scriba_db_books', JSON.stringify(state.books));
            localStorage.setItem('scriba_db_patrons', JSON.stringify(state.patrons));
            localStorage.setItem('scriba_db_txns', JSON.stringify(state.transactions));
        }

        function confirmResetDB() {
            openModal(`
                <div class="space-y-4">
                    <div class="w-12 h-12 bg-rose-100 dark:bg-rose-950/40 text-rose-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="font-bold text-lg dark:text-white">Reset Library Database?</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">This action will restore the pre-seeded library dataset. All custom transactions, new patrons, and modifications will be lost.</p>
                    </div>
                    <div class="flex gap-3 justify-center pt-3">
                        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">Cancel</button>
                        <button onclick="performDBReset()" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-sm font-semibold transition-all">Reset Database</button>
                    </div>
                </div>
            `);
        }

        function performDBReset() {
            initDatabase(true);
            closeModal();
            renderActiveTab();
        }

        // Tab Switching Engine
        function switchTab(tabId) {
            state.currentTab = tabId;
            
            // Set nav menu states
            const allNavs = document.querySelectorAll('aside nav button, .mobile-nav-btn');
            allNavs.forEach(nav => {
                const isCorrectTab = nav.id === `nav-${tabId}` || nav.id === `mobile-nav-${tabId}`;
                if (isCorrectTab) {
                    nav.className = nav.className.replace(/text-slate-600|dark:text-slate-400|hover:bg-slate-50|dark:hover:bg-slate-900/g, 'bg-primary-50 dark:bg-primary-950/30 text-primary-600 dark:text-primary-400 font-bold');
                } else {
                    nav.className = nav.className.replace(/bg-primary-50|dark:bg-primary-950\/30|text-primary-600|dark:text-primary-400|font-bold/g, 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900');
                }
            });

            // Update Header Title
            const headerTitles = {
                'dashboard': 'Dashboard Overview',
                'books': 'Books Catalog',
                'patrons': 'Patron Directory',
                'transactions': 'Circulation Desk',
                'ai': 'Librarian AI Copilot'
            };
            document.getElementById('page-title').textContent = headerTitles[tabId] || 'Library Management';

            renderActiveTab();
        }

        function renderActiveTab() {
            const pane = document.getElementById('content-pane');
            switch (state.currentTab) {
                case 'dashboard':
                    pane.innerHTML = renderDashboardView();
                    renderPopularGenresChart();
                    break;
                case 'books':
                    pane.innerHTML = renderBooksView();
                    break;
                case 'patrons':
                    pane.innerHTML = renderPatronsView();
                    break;
                case 'transactions':
                    pane.innerHTML = renderTransactionsView();
                    break;
                case 'ai':
                    pane.innerHTML = renderAIView();
                    break;
            }
            lucide.createIcons();
        }

        // Toast Engine
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-950/30 dark:border-emerald-900/40 dark:text-emerald-400',
                error: 'bg-rose-50 border-rose-200 text-rose-800 dark:bg-rose-950/30 dark:border-rose-900/40 dark:text-rose-400',
                info: 'bg-indigo-50 border-indigo-200 text-indigo-800 dark:bg-indigo-950/30 dark:border-indigo-900/40 dark:text-indigo-400'
            };
            
            const icons = {
                success: 'check-circle-2',
                error: 'alert-circle',
                info: 'info'
            };

            toast.className = `flex items-center gap-3 p-4 rounded-xl border ${colors[type]} shadow-xl transition-all duration-300 transform translate-y-5 opacity-0`;
            toast.innerHTML = `
                <i data-lucide="${icons[type]}" class="w-5 h-5 shrink-0"></i>
                <span class="text-sm font-semibold">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-5', 'opacity-0');
            }, 10);

            // Animate Out
            setTimeout(() => {
                toast.classList.add('translate-y-5', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 4000);
        }

        // Modal Engine
        function openModal(htmlContent) {
            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <button onclick="closeModal()" class="absolute top-4 right-4 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                ${htmlContent}
            `;
            container.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('opacity-0');
            }, 10);
            lucide.createIcons();
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.classList.add('opacity-0');
            setTimeout(() => {
                container.classList.add('hidden');
            }, 200);
        }

        // Dark Mode Engine
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            state.isDarkMode = isDark;
            localStorage.setItem('scriba_theme', isDark ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem('scriba_theme');
            const isDark = savedTheme === 'dark';
            state.isDarkMode = isDark;
            const html = document.documentElement;
            if (isDark) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
            const label = document.getElementById('theme-label');
            if (label) {
                label.textContent = isDark ? 'Light Theme' : 'Dark Theme';
            }
        }

        function toggleMobileMenu() {
            const drawer = document.getElementById('mobile-drawer');
            drawer.classList.toggle('hidden');
        }

        // Calculation Helpers for Active/Overdue elements
        function getOverdueLoans() {
            const today = new Date();
            return state.transactions.filter(txn => {
                const dueDate = new Date(txn.dueDate);
                return txn.returnDate === null && dueDate < today;
            });
        }

        function getActiveLoans() {
            return state.transactions.filter(txn => txn.returnDate === null);
        }

        /* ----------------------------------------------------
           TAB: DASHBOARD VIEW
           ---------------------------------------------------- */
        function renderDashboardView() {
            const totalCatalog = state.books.reduce((acc, curr) => acc + parseInt(curr.totalCopies), 0);
            const totalCheckedOut = state.books.reduce((acc, curr) => acc + parseInt(curr.checkedOut), 0);
            const availableBooks = totalCatalog - totalCheckedOut;
            const activeLoans = getActiveLoans().length;
            const overdueCount = getOverdueLoans().length;
            const activePatrons = state.patrons.filter(p => p.status === 'Active').length;

            // Generate recent actions feed
            const recentTxns = [...state.transactions]
                .sort((a, b) => new Date(b.issueDate) - new Date(a.issueDate))
                .slice(0, 4);

            let activityFeedHTML = '';
            if (recentTxns.length === 0) {
                activityFeedHTML = `<div class="text-center p-6 text-slate-400 text-sm">No recent circulation logs.</div>`;
            } else {
                recentTxns.forEach(txn => {
                    const book = state.books.find(b => b.isbn === txn.isbn) || { title: 'Unknown Book' };
                    const patron = state.patrons.find(p => p.id === txn.patronId) || { name: 'Unknown Patron' };
                    const isReturned = txn.returnDate !== null;
                    activityFeedHTML += `
                        <div class="flex items-center justify-between py-3 border-b border-slate-100 dark:border-slate-800 last:border-0">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg ${isReturned ? 'bg-emerald-50 dark:bg-emerald-950/20 text-emerald-600' : 'bg-primary-50 dark:bg-primary-950/20 text-primary-600'} flex items-center justify-center">

        function renderPopularGenresChart() {
            const container = document.getElementById('genres-chart-container');
            if (!container) return;

            // Compute counts
            const genresCount = {};
            state.books.forEach(b => {
                genresCount[b.genre] = (genresCount[b.genre] || 0) + parseInt(b.totalCopies);
            });

            const total = Object.values(genresCount).reduce((a, b) => a + b, 0) || 1;
            const colors = ['bg-primary-500', 'bg-emerald-500', 'bg-indigo-500', 'bg-amber-500', 'bg-pink-500', 'bg-cyan-500'];

            let html = '';
            let index = 0;
            for (const [genre, count] of Object.entries(genresCount)) {
                const percentage = Math.round((count / total) * 100);
                const color = colors[index % colors.length];
                html += `
                    <div>
                        <div class="flex items-center justify-between text-xs font-semibold mb-1">
                            <span class="text-slate-600 dark:text-slate-400">${genre}</span>
                            <span class="dark:text-white">${count} copies (${percentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                            <div class="${color} h-full" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
                index++;
            }
            container.innerHTML = html;
        }

            state.books.push({

                genre: data.get('genre').trim(),
                year: data.get('year').trim(),

                    <div class="flex gap-3 justify-center pt-3">
                        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">Cancel</button>

                    </div>
                </div>
            `);
        }

        function performDeleteBook(isbn) {
            state.books = state.books.filter(b => b.isbn !== isbn);
            // Erase also transaction histories linked if desired, or keep as historical log. We keep transaction log intact with historical references.
            saveDatabase();
            showToast('Book catalog entry deleted.', 'info');
            closeModal();
            renderActiveTab();
        }

        /* ----------------------------------------------------
           TAB: PATRON DIRECTORY VIEW
           ---------------------------------------------------- */
        function renderPatronsView() {
            const filteredPatrons = state.patrons.filter(p => {
                const searchStr = `${p.name} ${p.email} ${p.id}`.toLowerCase();
                const matchesSearch = searchStr.includes(state.searchTexts.patrons.toLowerCase());
                const matchesStatus = state.filters.patronStatus === 'All' || p.status === state.filters.patronStatus;
                return matchesSearch && matchesStatus;
            });

            let tableRows = '';
            if (filteredPatrons.length === 0) {
                tableRows = `
                    <tr>
                        <td colspan="5" class="text-center py-10 text-slate-400">
                            <i data-lucide="user-minus" class="w-10 h-10 mx-auto opacity-50 mb-2"></i>
                            <p class="font-medium">No matching library patrons found</p>
                        </td>
                    </tr>
                `;
            } else {
                filteredPatrons.forEach(p => {
                    const borrowedCount = state.transactions.filter(t => t.patronId === p.id && t.returnDate === null).length;
                    const isSuspended = p.status === 'Suspended';
                    tableRows += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/40 border-b border-slate-100 dark:border-slate-800 transition-colors">
                            <td class="py-4 px-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 flex items-center justify-center font-bold text-xs shrink-0">
                                        ${p.name.charAt(0)}
                                    </div>
                                    <div>
                                        <div class="font-bold text-slate-900 dark:text-white leading-snug">${p.name}</div>
                                        <div class="text-xs text-slate-400">${p.id}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="py-4 px-6 font-medium text-slate-700 dark:text-slate-300">
                                <div>${p.email}</div>
                                <div class="text-xs text-slate-400">${p.phone}</div>
                            </td>
                            <td class="py-4 px-6">
                                <span class="text-xs px-2.5 py-1 rounded-full font-semibold ${isSuspended ? 'bg-rose-100 text-rose-800 dark:bg-rose-950/30 dark:text-rose-400' : 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950/30 dark:text-emerald-400'}">
                                    ${p.status}
                                </span>
                            </td>
                            <td class="py-4 px-6 font-bold text-slate-800 dark:text-slate-200">
                                ${borrowedCount} titles
                            </td>
                            <td class="py-4 px-6 text-right">
                                <div class="flex gap-2 justify-end">
                                    <button onclick="openEditPatronModal('${p.id}')" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 hover:text-primary-600 transition-colors" title="Edit Patron Profile">
                                        <i data-lucide="edit" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="confirmDeletePatron('${p.id}')" class="p-1.5 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-lg text-slate-500 hover:text-rose-600 transition-colors" title="Remove Patron Profile">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }

            return `
                <div class="bg-white dark:bg-slate-950 rounded-2xl border border-slate-100 dark:border-slate-800 p-6 shadow-sm space-y-6">
                    <!-- Control panel -->
                    <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
                        <div class="flex flex-1 flex-col sm:flex-row items-stretch sm:items-center gap-3">
                            <div class="relative flex-1">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" value="${state.searchTexts.patrons}" oninput="handlePatronSearch(this)" placeholder="Search names, e-mails or IDs..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <select onchange="handlePatronStatusFilter(this)" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="All" ${state.filters.patronStatus === 'All' ? 'selected' : ''}>All Statuses</option>
                                <option value="Active" ${state.filters.patronStatus === 'Active' ? 'selected' : ''}>Active</option>
                                <option value="Suspended" ${state.filters.patronStatus === 'Suspended' ? 'selected' : ''}>Suspended</option>
                            </select>
                        </div>
                        
                        <button onclick="openAddPatronModal()" class="bg-primary-600 hover:bg-primary-700 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-all flex items-center justify-center gap-2">
                            <i data-lucide="user-plus" class="w-4 h-4"></i>
                            <span>Register Library Patron</span>
                        </button>
                    </div>

                    <!-- Directory Table -->
                    <div class="overflow-x-auto rounded-xl border border-slate-100 dark:border-slate-800/60">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead>
                                <tr class="bg-slate-50 dark:bg-slate-900 text-slate-500 font-semibold border-b border-slate-100 dark:border-slate-800">
                                    <th class="py-3 px-6">Patron Profile</th>
                                    <th class="py-3 px-6">Contact Channels</th>
                                    <th class="py-3 px-6">Privilege Status</th>
                                    <th class="py-3 px-6">Current Book Loans</th>
                                    <th class="py-3 px-6 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function handlePatronSearch(input) {
            state.searchTexts.patrons = input.value;
            renderActiveTab();
        }

        function handlePatronStatusFilter(select) {
            state.filters.patronStatus = select.value;
            renderActiveTab();
        }

        // Add Patron Modal Flow
        function openAddPatronModal() {
            const nextId = `PAT-0${state.patrons.length + 1}`;
            openModal(`
                <h3 class="font-bold text-lg mb-4 text-slate-900 dark:text-white">Register Library Patron</h3>
                <form id="add-patron-form" onsubmit="saveNewPatron(event)" class="space-y-4">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Full Name</label>
                            <input type="text" required name="name" placeholder="e.g. Eleanor Vance" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Patron ID</label>
                            <input type="text" required name="id" value="${nextId}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Email Address</label>
                        <input type="email" required name="email" placeholder="eleanor@example.com" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Phone Number</label>
                        <input type="text" required name="phone" placeholder="e.g. 555-0199" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Status Card</label>
                        <select name="status" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                            <option value="Active">Active Privileges</option>
                            <option value="Suspended">Suspended / Blocked</option>
                        </select>
                    </div>
                    <div class="flex justify-end gap-3 pt-2">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-900">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-xl text-sm font-semibold">Save Patron Profile</button>
                    </div>
                </form>
            `);
        }

        function saveNewPatron(e) {
            e.preventDefault();
            const form = document.getElementById('add-patron-form');
            const data = new FormData(form);
            const id = data.get('id').trim();

            if (state.patrons.some(p => p.id === id)) {
                showToast('Patron directory ID already exists!', 'error');
                return;
            }

            state.patrons.push({
                id: id,
                name: data.get('name').trim(),
                email: data.get('email').trim(),
                phone: data.get('phone').trim(),
                status: data.get('status')
            });

            saveDatabase();
            showToast('Patron profile registered successfully!', 'success');
            closeModal();
            renderActiveTab();
        }

        // Edit Patron Profile
        function openEditPatronModal(id) {
            const p = state.patrons.find(pat => pat.id === id);
            if (!p) return;

            openModal(`
                <h3 class="font-bold text-lg mb-4 text-slate-900 dark:text-white">Modify Patron Profile</h3>
                <form id="edit-patron-form" onsubmit="saveEditedPatron(event, '${id}')" class="space-y-4">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Full Name</label>
                            <input type="text" required name="name" value="${p.name}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Patron ID</label>
                            <input type="text" disabled value="${p.id}" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 rounded-xl py-2 px-3 text-sm text-slate-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Email Address</label>
                        <input type="email" required name="email" value="${p.email}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Phone Number</label>
                        <input type="text" required name="phone" value="${p.phone}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1.5">Status Card</label>
                        <select name="status" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2 px-3 text-sm focus:ring-2 focus:ring-primary-500">
                            <option value="Active" ${p.status === 'Active' ? 'selected' : ''}>Active Privileges</option>
                            <option value="Suspended" ${p.status === 'Suspended' ? 'selected' : ''}>Suspended / Blocked</option>
                        </select>
                    </div>
                    <div class="flex justify-end gap-3 pt-2">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-900">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-xl text-sm font-semibold">Update Profile</button>
                    </div>
                </form>
            `);
        }

        function saveEditedPatron(e, id) {
            e.preventDefault();
            const form = document.getElementById('edit-patron-form');
            const data = new FormData(form);

            const p = state.patrons.find(pat => pat.id === id);
            if (!p) return;

            p.name = data.get('name').trim();
            p.email = data.get('email').trim();
            p.phone = data.get('phone').trim();
            p.status = data.get('status');

            saveDatabase();
            showToast('Patron profile modified.', 'success');
            closeModal();
            renderActiveTab();
        }

        function confirmDeletePatron(id) {
            const p = state.patrons.find(pat => pat.id === id);
            if (!p) return;

            const activeLoansCount = state.transactions.filter(t => t.patronId === id && t.returnDate === null).length;
            if (activeLoansCount > 0) {
                showToast(`Patron has ${activeLoansCount} active book loans. Retake titles before erasure.`, 'error');
                return;
            }

            openModal(`
                <div class="space-y-4">
                    <div class="w-12 h-12 bg-rose-100 dark:bg-rose-950/40 text-rose-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="font-bold text-lg dark:text-white">Deregister Patron Profile?</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Confirming will eliminate <span class="font-bold">"${p.name}"</span> from Scriba Directory databases. Historical checked-in records remain unharmed.</p>
                    </div>
                    <div class="flex gap-3 justify-center pt-3">
                        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-900 transition-all">Cancel</button>
                        <button onclick="performDeletePatron('${id}')" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-sm font-semibold transition-all">Confirm Deregister</button>
                    </div>
                </div>
            `);
        }

        function performDeletePatron(id) {
            state.patrons = state.patrons.filter(p => p.id !== id);
            saveDatabase();
            showToast('Patron deregistrations concluded.', 'info');
            closeModal();
            renderActiveTab();
        }

        /* ----------------------------------------------------
           TAB: CIRCULATION DESK (TRANSACTIONS) VIEW
           ---------------------------------------------------- */
        function renderTransactionsView() {
            const filteredTxns = state.transactions.filter(t => {
                const book = state.books.find(b => b.isbn === t.isbn) || { title: '' };
                const patron = state.patrons.find(p => p.id === t.patronId) || { name: '' };
                
                const searchStr = `${book.title} ${patron.name} ${t.id} ${t.isbn}`.toLowerCase();
                const matchesSearch = searchStr.includes(state.searchTexts.transactions.toLowerCase());
                
                let matchesStatus = true;
                const todayStr = new Date().toISOString().split('T')[0];
                if (state.filters.txnStatus === 'Active') {
                    matchesStatus = t.returnDate === null;
                } else if (state.filters.txnStatus === 'Overdue') {
                    matchesStatus = t.returnDate === null && t.dueDate < todayStr;
                } else if (state.filters.txnStatus === 'Returned') {
                    matchesStatus = t.returnDate !== null;
                }

                return matchesSearch && matchesStatus;
            });

            let tableRows = '';
            if (filteredTxns.length === 0) {
                tableRows = `
                    <tr>
                        <td colspan="6" class="text-center py-10 text-slate-400">
                            <i data-lucide="check-square" class="w-10 h-10 mx-auto opacity-50 mb-2"></i>
                            <p class="font-medium">No transactions matched selected filters</p>
                        </td>
                    </tr>
                `;
            } else {
                const todayStr = new Date().toISOString().split('T')[0];
                filteredTxns.forEach(t => {
                    const book = state.books.find(b => b.isbn === t.isbn) || { title: 'Corrupted Record Title' };
                    const patron = state.patrons.find(p => p.id === t.patronId) || { name: 'Erase Link Patron' };
                    
                    const isReturned = t.returnDate !== null;
                    const isOverdue = !isReturned && t.dueDate < todayStr;

                    let statusBadge = '';
                    if (isReturned) {
                        statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full font-semibold bg-emerald-100 text-emerald-800 dark:bg-emerald-950/30 dark:text-emerald-400">Returned</span>`;
                    } else if (isOverdue) {
                        statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full font-semibold bg-rose-100 text-rose-850 dark:bg-rose-950/30 dark:text-rose-450 animate-pulse">Overdue Penalty</span>`;
                    } else {
                        statusBadge = `<span class="text-xs px-2.5 py-1 rounded-full font-semibold bg-indigo-100 text-indigo-850 dark:bg-indigo-950/30 dark:text-indigo-400">On Loan</span>`;
                    }

                    tableRows += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/40 border-b border-slate-100 dark:border-slate-800 transition-colors">
                            <td class="py-4 px-6 font-bold text-slate-600 dark:text-slate-400">${t.id}</td>
                            <td class="py-4 px-6">
                                <div class="font-bold text-slate-800 dark:text-slate-100 truncate max-w-[180px]">${book.title}</div>
                                <div class="text-xs text-slate-400">${t.isbn}</div>
                            </td>
                            <td class="py-4 px-6">
                                <div class="font-semibold text-slate-800 dark:text-slate-100">${patron.name}</div>
                                <div class="text-xs text-slate-400">${t.patronId}</div>
                            </td>
                            <td class="py-4 px-6 text-slate-500 dark:text-slate-400 font-medium">
                                <div>Issue: ${t.issueDate}</div>
                                <div>Due: <span class="${isOverdue ? 'text-rose-600 dark:text-rose-450 font-bold' : ''}">${t.dueDate}</span></div>
                            </td>
                            <td class="py-4 px-6">${statusBadge}</td>
                            <td class="py-4 px-6 text-right">
                                ${!isReturned ? `
                                    <button onclick="processReturn('${t.id}')" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs rounded-lg shadow-sm transition-all flex items-center gap-1 ml-auto">
                                        <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                        <span>Check In</span>
                                    </button>
                                ` : `
                                    <span class="text-xs text-slate-400">Returned on: ${t.returnDate}</span>
                                `}
                            </td>
                        </tr>
                    `;
                });
            }

            return `
                <div class="bg-white dark:bg-slate-950 rounded-2xl border border-slate-100 dark:border-slate-800 p-6 shadow-sm space-y-6">
                    <!-- Filters -->
                    <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
                        <div class="flex flex-1 flex-col sm:flex-row items-stretch sm:items-center gap-3">
                            <div class="relative flex-1">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" value="${state.searchTexts.transactions}" oninput="handleTxnSearch(this)" placeholder="Search books, names, isbn, IDs..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <select onchange="handleTxnStatusFilter(this)" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="All" ${state.filters.txnStatus === 'All' ? 'selected' : ''}>All Logs</option>
                                <option value="Active" ${state.filters.txnStatus === 'Active' ? 'selected' : ''}>Active Loans</option>
                                <option value="Overdue" ${state.filters.txnStatus === 'Overdue' ? 'selected' : ''}>Overdue Warning</option>
                                <option value="Returned" ${state.filters.txnStatus === 'Returned' ? 'selected' : ''}>Returned History</option>
                            </select>
                        </div>
                        
                        <button onclick="openBorrowModal()" class="bg-primary-600 hover:bg-primary-700 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-all flex items-center justify-center gap-2">
                            <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                            <span>Check-Out Book</span>
                        </button>
                    </div>

                    <!-- List Table -->
                    <div class="overflow-x-auto rounded-xl border border-slate-100 dark:border-slate-800/60">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead>
                                <tr class="bg-slate-50 dark:bg-slate-900 text-slate-500 font-semibold border-b border-slate-100 dark:border-slate-800">
                                    <th class="py-3 px-6">ID</th>
                                    <th class="py-3 px-6">Issued Title</th>
                                    <th class="py-3 px-6">Borrower</th>
                                    <th class="py-3 px-6">Dates Range</th>
                                    <th class="py-3 px-6">Status State</th>
                                    <th class="py-3 px-6 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function handleTxnSearch(input) {
            state.searchTexts.transactions = input.value;
            renderActiveTab();
        }

        function handleTxnStatusFilter(select) {
            state.filters.txnStatus = select.value;
            renderActiveTab();
        }

        // Check Out Book (Circulation process)
        function openBorrowModal() {
            // Pick eligible books (has available stock)
            const availableBooks = state.books.filter(b => b.totalCopies - b.checkedOut > 0);
            const activePatrons = state.patrons.filter(p => p.status === 'Active');

            if (availableBooks.length === 0) {
                showToast('All book catalog copies currently lent. No inventory available.', 'error');
                return;
            }
            if (activePatrons.length === 0) {
                showToast('No active patrons available in system. Register or unsuspend patrons.', 'error');

        function performCheckOut(e) {
            e.preventDefault();
            const form = document.getElementById('borrow-form');
            const data = new FormData(form);

            const patronId = data.get('patronId');
            const isbn = data.get('isbn');
            const issueDate = data.get('issueDate');
            const dueDate = data.get('dueDate');

            // Find matchings
            const book = state.books.find(b => b.isbn === isbn);
            const patron = state.patrons.find(p => p.id === patronId);

            if (!book || !patron) {
                showToast('Database mapping fault during processing.', 'error');
                return;
            }

            if (book.totalCopies - book.checkedOut <= 0) {
                showToast('Selected book ran out of stock.', 'error');
                return;
            }

            // Create txn record
            const nextTxnId = `TXN-${8000 + state.transactions.length + 1}`;
            state.transactions.push({
                id: nextTxnId,
                isbn: isbn,
                patronId: patronId,
                issueDate: issueDate,
                dueDate: dueDate,
                returnDate: null
            });

            // Adjust Book counters
            book.checkedOut += 1;

            saveDatabase();
            showToast(`Circulation transaction completed! Key: ${nextTxnId}`, 'success');
            closeModal();
            renderActiveTab();
        }

        // Return a book
        function processReturn(txnId) {
            const txn = state.transactions.find(t => t.id === txnId);
            if (!txn) return;

            const book = state.books.find(b => b.isbn === txn.isbn);
            if (book) {
                book.checkedOut = Math.max(0, book.checkedOut - 1);
            }

            const todayStr = new Date().toISOString().split('T')[0];
            txn.returnDate = todayStr;

            saveDatabase();
            showToast('Book returned and database stocks modified!', 'success');
            renderActiveTab();
        }

        // Standard Gemini API Call (Supports Exponential Backoff)
        async function callGemini(prompt, systemPrompt = "You are an intelligent, expert AI Librarian Assistant for a library information system database named Scriba. Your duty is to provide highly contextual analytical output matching exact schema details given to you.") {
            const apiKey = ""; // Set dynamically by runtime sandbox
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let attempts = 0;
            const maxRetries = 5;

            while (attempts < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "Empty response from server models.";
                } catch (e) {
                    attempts++;
                    if (attempts >= maxRetries) {
                        throw new Error(`Max API retry threshold reached. Failed with exception: ${e.message}`);
                    }
                    // Exponential backoff wait (1s, 2s, 4s, 8s, 16s)
                    const waitTime = Math.pow(2, attempts) * 1000;
                    await new Promise(res => setTimeout(res, waitTime));
                }
            }
        }
